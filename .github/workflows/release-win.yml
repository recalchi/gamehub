name: release-win

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer + portable + manifest
        run: npm run dist:win:full
        env:
          ELECTRON_CACHE: ${{ github.workspace }}\\.cache\\electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\\.cache\\electron-builder

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = node -p "require('./package.json').version"
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/GameHub-Setup-x64-${{ steps.version.outputs.version }}.exe
            release/GameHub-Setup-x64-${{ steps.version.outputs.version }}.exe.blockmap
            release/GameHub-portable-x64-${{ steps.version.outputs.version }}.zip
            release/latest.yml
            release/releases.json
            release/GameHub-Setup-x64-${{ steps.version.outputs.version }}.exe.sha256
            release/GameHub-portable-x64-${{ steps.version.outputs.version }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
